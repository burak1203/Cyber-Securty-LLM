services:
  cyber-sec-analyzer:
    build: .
    container_name: soc-analyzer-node
    # Port mapping for local Windows environment and Honeypot exposure
    ports:
      - "5000:5000"
      - "8000:8000" # Exposing honeypot port for testing
    # Kernel-level privileges required for promiscuous packet capture
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      # 'host.docker.internal' routes the container to the local Windows Ollama instance
      - OLLAMA_API_URL=http://host.docker.internal:11434/api/generate
      - OLLAMA_MODEL=mistral
    volumes:
      # Persist logs outside the container
      - ./network_analysis.log:/app/network_analysis.log
      - ./llm_analysis.log:/app/llm_analysis.log
    restart: unless-stopped